name: Build pbiviz

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build pbiviz package
        run: npx pbiviz package

      - name: Upload pbiviz artifact
        uses: actions/upload-artifact@v4
        with:
          name: multiLevelSankey-pbiviz
          path: dist/*.pbiviz
          retention-days: 30
